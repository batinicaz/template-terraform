name: Pre-commit Cache
on:
  push:
    branches: [main]
    paths: [".pre-commit-config.yaml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: batinicaz/gha/.github/actions/pre-commit@v1
