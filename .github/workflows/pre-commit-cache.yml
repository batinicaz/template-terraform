name: Pre-commit Cache
on:
  push:
    branches: [main]
    paths: [".pre-commit-config.yaml"]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: batinicaz/gha/.github/actions/pre-commit@ed9c463aed4eb9640fb5a404e7b8d418a28f4e07 # v1
