name: Lint & Plan
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
      - "!main"
permissions:
  contents: read
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run pre-commit
        uses: batinicaz/gha/.github/actions/pre-commit@v1
  terraform:
    uses: batinicaz/gha/.github/workflows/terraform-plan.yml@v1
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    with:
      working_directory: "."
    secrets:
      INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_IDENTITY_ID }}
